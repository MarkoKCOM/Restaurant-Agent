        <h1>OpenSeat — restaurant reservations, guest book, and a membership club</h1>
        <p>
          OpenSeat (אופן-סיט) is a guest-retention platform for restaurants. It brings
          online reservations, a digital guest book, and a WhatsApp-based membership club
          together in one system. OpenSeat works through WhatsApp, a one-line website
          widget, and a white-label dashboard that runs on any tablet or computer, in
          Hebrew, English, and Arabic.
        </p>

        <h2>What OpenSeat does</h2>
        <ul>
          <li>Takes online reservations through an embeddable one-line website widget.</li>
          <li>Handles bookings, confirmations, and reminders over WhatsApp automatically.</li>
          <li>Keeps a digital guest book that remembers every guest and every visit.</li>
          <li>Runs a membership club with points, tiers, and rewards to bring guests back.</li>
          <li>Gives owners a white-label dashboard they fully own and brand.</li>
          <li>Speaks Hebrew, English, and Arabic, auto-detecting each guest's language.</li>
        </ul>

        <h2>Pricing</h2>
        <p>
          Pilot pricing starts at ₪299/month for the first 5 restaurants. Standard plans
          start at ₪499/month. Annual plans give 12 months for the price of 10, and monthly
          plans can be cancelled anytime.
        </p>
