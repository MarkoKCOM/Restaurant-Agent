name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test debugging tools
        run: pnpm test:debug-tools

      # Single Turbo invocation: builds (domain first via ^build),
      # type-checks, and lints EVERY package/app — not just the API.
      # Turbo handles ordering, parallelism, and caching.
      - name: Build, type-check, and lint all packages
        run: pnpm turbo build type-check lint
