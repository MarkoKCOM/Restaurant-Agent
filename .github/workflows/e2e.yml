name: API Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api-smoke:
    runs-on: ubuntu-latest

    env:
      OPENSEAT_API_URL: ${{ secrets.OPENSEAT_API_URL || secrets.SABLE_API_URL }}
      OPENSEAT_ADMIN_EMAIL: ${{ secrets.OPENSEAT_ADMIN_EMAIL || secrets.SABLE_ADMIN_EMAIL }}
      OPENSEAT_ADMIN_PASSWORD: ${{ secrets.OPENSEAT_ADMIN_PASSWORD || secrets.SABLE_ADMIN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API reliability smoke test
        if: env.OPENSEAT_ADMIN_PASSWORD != ''
        run: node scripts/api-reliability-smoke.mjs
