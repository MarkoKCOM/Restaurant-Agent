<!-- OpenSeat email signature block.
     Paste into your email client's HTML signature editor.
     Replace NAME, ROLE, PHONE. Uses an inline-safe table layout. -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, Helvetica, sans-serif; color:#1A0F10;">
  <tr>
    <td style="vertical-align:top; padding-right:16px; border-right:2px solid #C41E3A;">
      <img src="https://openseat.app/branding/png/openseat-mark-128.png" width="52" height="52" alt="OpenSeat" style="display:block; border-radius:12px;">
    </td>
    <td style="vertical-align:top; padding-left:16px;">
      <div style="font-size:16px; font-weight:bold; color:#1A0F10;">NAME</div>
      <div style="font-size:13px; color:#7A6C6E; margin:2px 0 8px;">ROLE · OpenSeat</div>
      <div style="font-size:12px; color:#4B3A3C; line-height:1.6;">
        <a href="tel:PHONE" style="color:#4B3A3C; text-decoration:none;">PHONE</a><br>
        <a href="https://openseat.app" style="color:#C41E3A; text-decoration:none; font-weight:bold;">openseat.app</a>
      </div>
    </td>
  </tr>
</table>
