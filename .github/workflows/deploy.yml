name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "apps/booking-widget/**"
      - "apps/dashboard/**"
      - "apps/marketing-site/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "apps/booking-widget/**"
      - "apps/dashboard/**"
      - "apps/marketing-site/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  detect-deploy-impact:
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.filter.outputs.should_deploy }}
      deploy-dashboard: ${{ steps.filter.outputs.deploy_dashboard }}
      deploy-marketing: ${{ steps.filter.outputs.deploy_marketing }}
      deploy-widget: ${{ steps.filter.outputs.deploy_widget }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 HEAD)"
          fi

          should_deploy=false
          deploy_dashboard=false
          deploy_marketing=false
          deploy_widget=false
          while IFS= read -r path; do
            case "$path" in
              apps/dashboard/*)
                should_deploy=true
                deploy_dashboard=true
                ;;
              apps/marketing-site/*)
                should_deploy=true
                deploy_marketing=true
                ;;
              apps/booking-widget/*)
                should_deploy=true
                deploy_widget=true
                ;;
              packages/*|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json)
                should_deploy=true
                deploy_dashboard=true
                deploy_marketing=true
                deploy_widget=true
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "deploy_dashboard=$deploy_dashboard" >> "$GITHUB_OUTPUT"
          echo "deploy_marketing=$deploy_marketing" >> "$GITHUB_OUTPUT"
          echo "deploy_widget=$deploy_widget" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy"
          echo "deploy_dashboard=$deploy_dashboard"
          echo "deploy_marketing=$deploy_marketing"
          echo "deploy_widget=$deploy_widget"

  deploy-dashboard:
    needs: detect-deploy-impact
    if: needs.detect-deploy-impact.outputs.deploy-dashboard == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DASHBOARD_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel config
        run: vercel pull --yes --token=$VERCEL_TOKEN --cwd apps/dashboard

      - name: Build with Vercel
        run: vercel build --token=$VERCEL_TOKEN --cwd apps/dashboard ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }}

      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --token=$VERCEL_TOKEN --cwd apps/dashboard

      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --cwd apps/dashboard

  deploy-marketing:
    needs: detect-deploy-impact
    if: needs.detect-deploy-impact.outputs.deploy-marketing == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel config
        run: vercel pull --yes --token=$VERCEL_TOKEN --cwd apps/marketing-site

      - name: Build with Vercel
        run: vercel build --token=$VERCEL_TOKEN --cwd apps/marketing-site ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }}

      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --token=$VERCEL_TOKEN --cwd apps/marketing-site

      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --cwd apps/marketing-site

  deploy-widget:
    needs: detect-deploy-impact
    if: needs.detect-deploy-impact.outputs.deploy-widget == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WIDGET_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel config
        run: vercel pull --yes --token=$VERCEL_TOKEN --cwd apps/booking-widget

      - name: Build with Vercel
        run: vercel build --token=$VERCEL_TOKEN --cwd apps/booking-widget ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }}

      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --token=$VERCEL_TOKEN --cwd apps/booking-widget

      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --cwd apps/booking-widget
